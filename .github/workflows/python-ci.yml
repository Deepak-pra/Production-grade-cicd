name: Python CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        working-directory: apps/python
        run: flake8 . --config .flake8
        continue-on-error: true

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: apps/python
        run: pytest tests/ -v
        #testing
