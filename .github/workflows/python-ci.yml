name: Python CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        working-directory: apps/python
        run: flake8 . --config .flake8
        continue-on-error: true

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: apps/python
        run: pytest tests/ -v

  build:
    name: Build Python App
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Install build tool
        run: pip install build==1.2.1

      - name: Build Python app
        working-directory: apps/python
        run: |
          python -m build
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shipfast-api-python-${{ github.sha }}
          path: apps/python/dist/
          retention-days: 7