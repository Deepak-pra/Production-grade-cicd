name: Python CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Python Project
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required Python files
        run: |
          required_files=(
            "apps/python/app.py"
            "apps/python/calculator.py"
            "apps/python/pipeline.py"
            "apps/python/pyproject.toml"
            "apps/python/requirements.txt"
            "apps/python/requirements-dev.txt"
            "apps/python/.flake8"
            "apps/python/sonar-project.properties"
            "apps/python/tests/test_calculator.py"
            "apps/python/tests/test_pipeline.py"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
          done

          echo "All required Python files are present."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run flake8
        working-directory: apps/python
        run: |
          flake8 . --config .flake8

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate pyproject.toml
        working-directory: apps/python
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          tomllib.loads(Path("pyproject.toml").read_text())
          print("pyproject.toml is valid TOML")
          PY

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        working-directory: apps/python
        run: |
          pytest tests/test_calculator.py -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload Python unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-unit-coverage-${{ github.sha }}
          path: apps/python/coverage.xml
          retention-days: 7
          if-no-files-found: error

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration tests with coverage
        working-directory: apps/python
        run: |
          pytest tests/test_pipeline.py -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload Python integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-integration-coverage-${{ github.sha }}
          path: apps/python/coverage.xml
          retention-days: 7
          if-no-files-found: error

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate full coverage for SonarCloud
        working-directory: apps/python
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/python

  build:
    name: Build Python App
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - integration-test
      - sonar
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      environment_name: ${{ steps.version.outputs.environment_name }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      pr_head_sha: ${{ steps.version.outputs.pr_head_sha }}
      pr_base_branch: ${{ steps.version.outputs.pr_base_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute PR-based Python version
        id: version
        run: |
          set -euo pipefail

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="python-${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${PR_BASE_BRANCH}" >> "$GITHUB_OUTPUT"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"

          echo "Computed Python version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "PR base branch: ${PR_BASE_BRANCH}"
          echo "PR head SHA: ${PR_HEAD_SHA}"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build Python wheel
        working-directory: apps/python
        run: |
          python -m build

          echo "Python build output:"
          ls -lh dist/

      - name: Validate Python wheel artifact
        working-directory: apps/python
        run: |
          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "ERROR: Python wheel artifact was not generated."
            exit 1
          fi

          echo "Python wheel generated successfully:"
          ls -lh dist/*.whl

      - name: Generate artifact checksum
        working-directory: apps/python
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload Python build artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.event.pull_request.head.sha }}
          path: |
            apps/python/dist/*.whl
            apps/python/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Python build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.build.outputs.pr_head_sha }}
          path: apps/python/dist/

      - name: Show Python artifact before scan
        run: |
          echo "Downloaded Python artifact:"
          ls -lh apps/python/dist/

      - name: Run Trivy scan on Python runtime dependencies
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/requirements.txt
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish Python Artifact to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - trivy
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download Python build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.build.outputs.pr_head_sha }}
          path: dist/

      - name: Show release artifact
        run: |
          echo "Artifact to publish:"
          ls -lh dist/

      - name: Publish Python artifact to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          ENVIRONMENT_NAME: ${{ needs.build.outputs.environment_name }}
          PR_HEAD_SHA: ${{ needs.build.outputs.pr_head_sha }}
          PR_BASE_BRANCH: ${{ needs.build.outputs.pr_base_branch }}
        run: |
          set -euo pipefail

          echo "=================================================="
          echo "Publishing Python artifact to GitHub Release"
          echo "=================================================="
          echo "Environment : ${ENVIRONMENT_NAME}"
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "PR base     : ${PR_BASE_BRANCH}"
          echo "PR head SHA : ${PR_HEAD_SHA}"
          echo "Artifact:"
          ls -lh dist/
          echo "=================================================="

          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "ERROR: No Python .whl artifact found for release."
            exit 1
          fi

          if ! ls dist/SHA256SUMS.txt >/dev/null 2>&1; then
            echo "ERROR: No checksum file found for release."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Uploading assets with clobber."

            gh release upload "${RELEASE_TAG}" dist/*.whl dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating new release ${RELEASE_TAG}."

            gh release create "${RELEASE_TAG}" dist/*.whl dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Python Build ${VERSION}" \
              --notes "Python artifact built from PR head SHA ${PR_HEAD_SHA}, target branch ${PR_BASE_BRANCH}, environment ${ENVIRONMENT_NAME}" \
              --prerelease
          fi