name: Python CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        working-directory: apps/python
        run: |
          flake8 . --config .flake8
          echo "Flake8 passed — no issues found"

  test:
    name: Unit & Integration Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: apps/python
        run: pytest tests/test_calculator.py -v

      - name: Run integration tests
        working-directory: apps/python
        run: pytest tests/test_pipeline.py -v

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run full test suite with coverage
        working-directory: apps/python
        run: pytest tests/ -v --cov=. --cov-report=xml:coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: apps/python
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    name: Build Python App
    runs-on: ubuntu-latest
    needs: [lint, test, sonar]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and build tool
        working-directory: apps/python
        run: pip install -r requirements.txt build==1.2.1

      - name: Build Python app
        working-directory: apps/python
        run: |
          python -m build
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: apps/python/dist/
          retention-days: 1

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into target folder
        working-directory: apps/python
        run: |
          pip install -r requirements.txt --target installed-deps/
          echo "Installed packages:"
          ls installed-deps/

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          cache: true
          version: v0.69.3

      - name: Scan installed dependencies — table output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/installed-deps/
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Scan installed dependencies — JSON output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/installed-deps/
          format: json
          output: trivy-python-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-python-scan-${{ github.sha }}
          path: trivy-python-results.json
          retention-days: 7

  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: trivy
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: dist/

      - name: Publish to GitHub Releases
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA="${SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"

          echo "=== Publishing Python artifact ==="
          echo "Version : $VERSION"
          echo "SHA     : $SHA"
          ls -lh dist/

          gh release create "python-${VERSION}" \
            --repo ${{ github.repository }} \
            --title "Python Build ${VERSION}" \
            --notes "Automated CI build — Branch: ${{ github.ref_name }} — SHA: ${SHA}" \
            --prerelease \
            dist/*.whl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show download URL
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA="${SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"
          echo "=== Artifact available at ==="
          echo "https://github.com/${{ github.repository }}/releases/tag/python-${VERSION}"
          echo "CD can download with:"
          echo "gh release download python-${VERSION} --repo ${{ github.repository }} --pattern '*.whl'"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}