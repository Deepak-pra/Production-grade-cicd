name: Python CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run flake8
        working-directory: apps/python
        run: |
          flake8 . --config .flake8

  unit-test:
    name: Unit Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate pyproject.toml
        working-directory: apps/python
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          tomllib.loads(Path("pyproject.toml").read_text())
          print("pyproject.toml is valid TOML")
          PY

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        working-directory: apps/python
        run: |
          pytest tests/test_calculator.py -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload Python unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-unit-coverage-${{ github.sha }}
          path: apps/python/coverage.xml
          retention-days: 7
          if-no-files-found: error

  integration-test:
    name: Integration Test (pytest)
    runs-on: ubuntu-latest
    needs: unit-test
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration tests with coverage
        working-directory: apps/python
        run: |
          pytest tests/test_pipeline.py -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload Python integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-integration-coverage-${{ github.sha }}
          path: apps/python/coverage.xml
          retention-days: 7
          if-no-files-found: error

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate full coverage for SonarCloud
        working-directory: apps/python
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/python

  build:
    name: Build Python App
    runs-on: ubuntu-latest
    needs: sonar
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          echo "Computed Python version: ${VERSION}"

      - name: Install build dependencies
        working-directory: apps/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build Python wheel
        working-directory: apps/python
        run: |
          python -m build

          echo "Python build output:"
          ls -lh dist/

      - name: Upload Python build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: apps/python/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Python build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: apps/python/dist/

      - name: Show Python artifact before scan
        run: |
          echo "Downloaded Python artifact:"
          ls -lh apps/python/dist/

      - name: Show Python runtime dependency file
        run: |
          echo "Runtime dependency file scanned by Trivy:"
          cat apps/python/requirements.txt

      - name: Run Trivy scan on Python runtime dependencies
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/requirements.txt
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs:
      - build
      - trivy
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download Python build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: dist/

      - name: Publish Python artifact to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_TAG="python-${VERSION}"

          echo "=================================================="
          echo "Publishing Python artifact to GitHub Releases"
          echo "=================================================="
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "Branch      : ${GITHUB_REF_NAME}"
          echo "SHA         : ${GITHUB_SHA}"
          echo "Artifact:"
          ls -lh dist/
          echo "=================================================="

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Uploading asset with clobber."

            gh release upload "${RELEASE_TAG}" dist/*.whl \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating new release ${RELEASE_TAG}."

            gh release create "${RELEASE_TAG}" dist/*.whl \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Python Build ${VERSION}" \
              --notes "Python artifact built from ${GITHUB_SHA} on branch ${GITHUB_REF_NAME}" \
              --prerelease
          fi