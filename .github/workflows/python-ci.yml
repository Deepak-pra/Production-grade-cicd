name: Python CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"

jobs:

  # ── Runs in parallel with test and sonar ──────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        working-directory: apps/python
        run: |
          flake8 . --config .flake8
          echo "Flake8 passed — no issues found"
        continue-on-error: true

  # ── Runs in parallel with lint and sonar ─────────────────────────
  test:
    name: Unit & Integration Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: apps/python
        run: pytest tests/test_calculator.py -v

      - name: Run integration tests
        working-directory: apps/python
        run: pytest tests/test_pipeline.py -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: apps/python/coverage.xml
          retention-days: 3

  # ── Runs in parallel with lint and test ──────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run full test suite with coverage
        working-directory: apps/python
        run: pytest tests/ -v --cov=. --cov-report=xml:coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: apps/python
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Runs only after lint + test + sonar all pass ──────────────────
  build:
    name: Build Python App
    runs-on: ubuntu-latest
    needs: [lint, test, sonar]
    timeout-minutes: 10
    if: github.event_name == 'push'

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and build tool
        working-directory: apps/python
        run: pip install -r requirements.txt build==1.2.1

      - name: Build Python app
        working-directory: apps/python
        run: |
          python -m build
          ls -lh dist/

      - name: Compute version
        id: ver
        run: |
          SHA="${{ github.sha }}"
          VER="1.0.0-dev-${SHA:0:7}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

  # ── Runs only after build passes ─────────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild artifact for scan
        working-directory: apps/python
        run: |
          pip install -r requirements.txt build==1.2.1
          python -m build

      # SHA-pinned to v0.35.0 — safe version confirmed post supply chain incident (Mar 2026)
      # Full SHA from: https://github.com/aquasecurity/setup-trivy/releases/tag/v0.2.6
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          cache: true
          version: v0.69.3

      - name: Scan Python artifact — table output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/dist/
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Scan Python artifact — JSON output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/python/dist/
          format: json
          output: trivy-python-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-python-scan-${{ github.sha }}
          path: trivy-python-results.json
          retention-days: 7

  # ── Runs only after trivy passes ─────────────────────────────────
  jfrog-upload:
    name: JFrog Upload
    runs-on: ubuntu-latest
    needs: trivy
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild artifact for upload
        working-directory: apps/python
        run: |
          pip install -r requirements.txt build==1.2.1
          python -m build

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_TOKEN }}

      - name: Upload to JFrog
        run: |
          SHA=${{ github.sha }}
          jf rt upload \
            'apps/python/dist/*.whl' \
            "shipfast-python/${SHA}/"
          echo "Uploaded shipfast-python wheel for SHA: $SHA"