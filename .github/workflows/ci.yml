name: CI Pipeline

on:
    push:
        branches: dev

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Code checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: "20"

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.14"    