name: Node CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - ".github/workflows/demo-node-ci.yml"
      - ".github/workflows/demo-node-cd.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: node-ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  metadata:
    name: Resolve CI Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}
      version: ${{ steps.resolve.outputs.version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      pr_head_sha: ${{ steps.resolve.outputs.pr_head_sha }}
      pr_base_branch: ${{ steps.resolve.outputs.pr_base_branch }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}

    steps:
      - name: Resolve version and release metadata
        id: resolve
        run: |
          set -euo pipefail

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"
          ARTIFACT_NAME="node-dist-${PR_HEAD_SHA}"

          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${PR_BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

          echo "Environment : ${ENVIRONMENT_NAME}"
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "PR SHA      : ${PR_HEAD_SHA}"
          echo "Base branch : ${PR_BASE_BRANCH}"

  validate:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 10

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Validate required files
        run: |
          set -euo pipefail

          required_files=(
            "apps/node/package.json"
            "apps/node/package-lock.json"
            "apps/node/.eslintrc.json"
            "apps/node/sonar-project.properties"
            "apps/node/src/utils.js"
            "apps/node/src/pipeline.js"
            "apps/node/src/server.js"
            "apps/node/__tests__/utils.test.js"
            "apps/node/__tests__/pipeline.test.js"
            "apps/node/scripts/build-web.js"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Required file missing: ${file}"
              exit 1
            fi
          done

          echo "Required Node files are present."

      - name: Validate package scripts
        run: |
          set -euo pipefail

          if ! grep -q '"build"' apps/node/package.json; then
            echo "ERROR: package.json does not contain build script."
            exit 1
          fi

          if ! grep -q '"build:web"' apps/node/package.json; then
            echo "ERROR: package.json does not contain build:web script."
            echo "Expected:"
            echo '"build:web": "node scripts/build-web.js"'
            exit 1
          fi

          if ! grep -q '"test"' apps/node/package.json; then
            echo "ERROR: package.json does not contain test script."
            exit 1
          fi

          if ! grep -q '"lint"' apps/node/package.json; then
            echo "ERROR: package.json does not contain lint script."
            exit 1
          fi

          echo "Required package scripts are present."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - metadata
      - validate
    timeout-minutes: 10

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run lint
        working-directory: apps/node
        run: npm run lint

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs:
      - metadata
      - validate
    timeout-minutes: 10

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run unit tests
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs:
      - metadata
      - validate
    timeout-minutes: 10

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run integration tests
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - metadata
      - unit-test
      - integration-test
    timeout-minutes: 15

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Generate coverage for SonarCloud
        working-directory: apps/node
        run: npm test

      - name: Verify coverage report
        working-directory: apps/node
        run: |
          set -euo pipefail

          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: coverage/lcov.info was not generated."
            exit 1
          fi

          ls -lh coverage/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs:
      - metadata
      - lint
      - unit-test
      - integration-test
      - sonar
    timeout-minutes: 15

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Build npm package artifact
        working-directory: apps/node
        run: |
          set -euo pipefail

          npm run build

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: Node .tgz artifact was not generated."
            exit 1
          fi

          echo "Node package artifact:"
          ls -lh dist/*.tgz

      - name: Build static web artifact
        working-directory: apps/node
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail

          npm run build:web

          required_files=(
            "dist/web/index.html"
            "dist/web/error.html"
            "dist/web/styles.css"
            "dist/web/health.json"
            "dist/web/version.json"
            "dist/web/deployment-info.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Missing static web file: ${file}"
              exit 1
            fi
          done

          WEB_ZIP_NAME="node-web-${VERSION}.zip"

          cd dist/web
          zip -r "../${WEB_ZIP_NAME}" .
          cd ..

          echo "Static web artifact:"
          ls -lh "${WEB_ZIP_NAME}"

      - name: Generate checksum
        working-directory: apps/node
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.tgz node-web-*.zip > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_name }}
          path: |
            apps/node/dist/*.tgz
            apps/node/dist/node-web-*.zip
            apps/node/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

      - name: Write build summary
        run: |
          {
            echo "## Node CI Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Run Number | ${GITHUB_RUN_NUMBER} |"
            echo "| Triggered By | ${GITHUB_ACTOR} |"
            echo "| Job Status | ${{ job.status }} |"
            echo "| Environment | ${{ needs.metadata.outputs.environment_name }} |"
            echo "| Version | ${{ needs.metadata.outputs.version }} |"
            echo "| Release tag reserved | ${{ needs.metadata.outputs.release_tag }} |"
            echo "| PR base branch | ${{ needs.metadata.outputs.pr_base_branch }} |"
            echo "| PR head SHA | ${{ needs.metadata.outputs.pr_head_sha }} |"
            echo "| Package artifact | .tgz |"
            echo "| Static web artifact | node-web-*.zip |"
            echo "| Checksum file | SHA256SUMS.txt |"
          } >> "$GITHUB_STEP_SUMMARY"

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    timeout-minutes: 15

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.pr_head_sha }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_name }}
          path: apps/node/dist/

      - name: Show scan inputs
        run: |
          set -euo pipefail

          echo "Node dependency files:"
          ls -lh apps/node/package.json
          ls -lh apps/node/package-lock.json

          echo "Build artifacts:"
          ls -lh apps/node/dist/

      - name: Run Trivy scan on Node dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/node
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

      - name: Write security summary
        run: |
          {
            echo "## Node CI Security Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Run Number | ${GITHUB_RUN_NUMBER} |"
            echo "| Triggered By | ${GITHUB_ACTOR} |"
            echo "| Job Status | ${{ job.status }} |"
            echo "| Scan target | apps/node |"
            echo "| Scanner | Trivy filesystem vulnerability scan |"
            echo "| Severity gate | HIGH,CRITICAL |"
            echo "| Policy | Build is blocked if HIGH or CRITICAL vulnerabilities are found |"
            echo "| Result | Passed because this job completed successfully |"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - trivy
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.artifact_name }}
          path: dist/

      - name: Validate release files
        run: |
          set -euo pipefail

          echo "Release files:"
          ls -lh dist/

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: .tgz artifact missing."
            exit 1
          fi

          if ! ls dist/node-web-*.zip >/dev/null 2>&1; then
            echo "ERROR: node-web-*.zip artifact missing."
            exit 1
          fi

          if [ ! -f dist/SHA256SUMS.txt ]; then
            echo "ERROR: SHA256SUMS.txt missing."
            exit 1
          fi

      - name: Fetch PR Approvers for Audit
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          APPROVERS="$(gh api \
            repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews \
            --jq '.[] | select(.state=="APPROVED") | .user.login' \
            | sort -u | tr '\n' ',' | sed 's/,$//')"

          if [ -z "${APPROVERS}" ]; then
            APPROVERS="N/A"
          fi

          echo "PR_APPROVERS=${APPROVERS}" >> "$GITHUB_ENV"

      - name: Publish artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          ENVIRONMENT_NAME: ${{ needs.metadata.outputs.environment_name }}
          PR_BASE_BRANCH: ${{ needs.metadata.outputs.pr_base_branch }}
          PR_HEAD_SHA: ${{ needs.metadata.outputs.pr_head_sha }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          if retry 3 2 gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release exists. Uploading assets with clobber."

            retry 3 2 gh release upload "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating release."

            retry 3 2 gh release create "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node CI build artifact for ${ENVIRONMENT_NAME}. PR base branch: ${PR_BASE_BRANCH}. PR head SHA: ${PR_HEAD_SHA}."
          fi

      - name: Write release summary
        run: |
          {
            echo "## Node CI Release Summary - Audit"
            echo ""
            echo "### Pipeline Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Run Number | ${GITHUB_RUN_NUMBER} |"
            echo "| Trigger Type | Pull Request |"
            echo "| Triggered By | ${GITHUB_ACTOR} |"
            echo "| Job Status | ${{ job.status }} |"
            echo "| Pipeline Status | Completed successfully up to release job |"
            echo ""
            echo "### Pull Request Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| PR Number | ${{ github.event.pull_request.number }} |"
            echo "| PR Author | ${{ github.event.pull_request.user.login }} |"
            echo "| PR Source Branch | ${{ github.event.pull_request.head.ref }} |"
            echo "| PR Target Branch | ${{ github.event.pull_request.base.ref }} |"
            echo "| PR Approvers | ${PR_APPROVERS} |"
            echo "| PR Head SHA | ${{ needs.metadata.outputs.pr_head_sha }} |"
            echo ""
            echo "### Build and Release Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | ${{ needs.metadata.outputs.environment_name }} |"
            echo "| Version | ${{ needs.metadata.outputs.version }} |"
            echo "| Release Tag | ${{ needs.metadata.outputs.release_tag }} |"
            echo "| Artifact Name | ${{ needs.metadata.outputs.artifact_name }} |"
            echo "| Package Artifact | .tgz |"
            echo "| Static Web Artifact | node-web-*.zip |"
            echo "| Checksum File | SHA256SUMS.txt |"
            echo ""
            echo "### Security and Compliance Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Lint | Passed before build |"
            echo "| Unit Test | Passed before build |"
            echo "| Integration Test | Passed before build |"
            echo "| SonarCloud Scan | Completed before build promotion |"
            echo "| Trivy Scan | Passed before release publishing |"
            echo "| Release Policy | Release is published only after all CI quality and security gates succeed |"
          } >> "$GITHUB_STEP_SUMMARY"