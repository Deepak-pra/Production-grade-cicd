name: Python Container Publish

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "GitHub Environment containing Docker Hub secrets"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

      target_registry:
        description: "Target container registry"
        required: true
        default: "dockerhub"
        type: choice
        options:
          - dockerhub
          - ghcr

      image_version:
        description: "Docker image version tag, for example v1.0.0-dev"
        required: true
        default: "v1.0.0-dev"
        type: string

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    name: Build and Push Python Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment: ${{ inputs.target_environment }}

    env:
      IMAGE_REPOSITORY: shipfast-python
      IMAGE_VERSION: ${{ inputs.image_version }}
      TARGET_REGISTRY: ${{ inputs.target_registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: |
          set -euo pipefail

          if [ ! -f apps/python/Dockerfile ]; then
            echo "ERROR: apps/python/Dockerfile is missing."
            exit 1
          fi

          echo "Dockerfile found: apps/python/Dockerfile"

      - name: Validate Docker Hub secrets
        if: ${{ inputs.target_registry == 'dockerhub' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is missing."
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is missing."
            exit 1
          fi

          echo "Docker Hub secrets are available."

      - name: Set Docker Hub image name
        if: ${{ inputs.target_registry == 'dockerhub' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          IMAGE_NAME="${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}"

          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

          echo "Target registry : Docker Hub"
          echo "Image name      : ${IMAGE_NAME}"
          echo "Image version   : ${IMAGE_VERSION}"
          echo "Full image      : ${IMAGE_NAME}:${IMAGE_VERSION}"

      - name: Set GHCR image name
        if: ${{ inputs.target_registry == 'ghcr' }}
        run: |
          set -euo pipefail

          REPOSITORY_LOWERCASE="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${REPOSITORY_LOWERCASE}/${IMAGE_REPOSITORY}"

          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

          echo "Target registry : GHCR"
          echo "Image name      : ${IMAGE_NAME}"
          echo "Image version   : ${IMAGE_VERSION}"
          echo "Full image      : ${IMAGE_NAME}:${IMAGE_VERSION}"

      - name: Login to Docker Hub
        if: ${{ inputs.target_registry == 'dockerhub' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: ${{ inputs.target_registry == 'ghcr' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/python
          file: apps/python/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}

      - name: Write publish summary
        run: |
          {
            echo "## Python Container Publish Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| GitHub Environment | ${{ inputs.target_environment }} |"
            echo "| Target registry | ${TARGET_REGISTRY} |"
            echo "| Image | ${IMAGE_NAME} |"
            echo "| Version tag | ${IMAGE_VERSION} |"
            echo ""
            echo "### Pull Command"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${IMAGE_VERSION}"
            echo '```'
            echo ""
            echo "### Run Command"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 8000:8000 ${IMAGE_NAME}:${IMAGE_VERSION}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"