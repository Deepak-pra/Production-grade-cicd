name: Python Docker Hub Publish

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "GitHub Environment containing Docker Hub secrets"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
      image_tag:
        description: "Docker image tag"
        required: true
        default: "dev"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    name: Build and Push Python Image to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment: ${{ inputs.target_environment }}

    env:
      IMAGE_REPOSITORY: shipfast-python
      IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is missing."
            echo "Check GitHub Environment secrets for the selected environment."
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is missing."
            echo "Check GitHub Environment secrets for the selected environment."
            exit 1
          fi

          echo "Docker Hub secrets are available."

      - name: Set Docker image name
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          IMAGE_NAME="${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}"

          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

          echo "Image name : ${IMAGE_NAME}"
          echo "Image tag  : ${IMAGE_TAG}"
          echo "Full image : ${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/python
          file: apps/python/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Write Docker Hub publish summary
        run: |
          {
            echo "## Python Docker Hub Publish Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| GitHub Environment | ${{ inputs.target_environment }} |"
            echo "| Registry | Docker Hub |"
            echo "| Image | ${IMAGE_NAME} |"
            echo "| Tag | ${IMAGE_TAG} |"
            echo "| Latest tag updated | yes |"
            echo ""
            echo "### Pull Command"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${IMAGE_TAG}"
            echo '```'
            echo ""
            echo "### Run Command"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 8000:8000 ${IMAGE_NAME}:${IMAGE_TAG}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"