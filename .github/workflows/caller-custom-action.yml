name:  Caller Workflow - Python Custom Action

on:
  pull_request:
    branches:
      - node-cd
    paths:
      - "apps/python/**"
      - ".github/workflows/python-ci.yml"
      - ".github/actions/python-validation-suite/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  python-ci:
    name: Python CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python Validation Suite
        uses: ./.github/actions/python-validation-suite
        with:
          app_path: apps/python

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/python

      - name: Build Python package
        working-directory: apps/python
        run: |
          set -euo pipefail

          pip install build
          python -m build

          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "ERROR: No .whl file generated"
            exit 1
          fi

          echo "Build output:"
          ls -lh dist/

      - name: Generate checksum
        working-directory: apps/python
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.whl > SHA256SUMS.txt

          echo "Checksum:"
          cat SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.sha }}
          path: |
            apps/python/dist/*.whl
            apps/python/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: python-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy scan on dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/python
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

      - name: Write summary
        run: |
          {
            echo "## Python CI Security Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Scan target | apps/python |"
            echo "| Tool | Trivy |"
            echo "| Gate | HIGH,CRITICAL |"
            echo "| Result | Passed if job succeeds |"
          } >> "$GITHUB_STEP_SUMMARY"