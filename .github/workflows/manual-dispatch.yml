name: Manual Run (Dispatch Demo)

# ── workflow_dispatch demo ─────────────────────────────
# Adds a "Run workflow" button to the GitHub Actions tab.
# Shows input types: choice, boolean, string.
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        type: choice
        options:
          - staging
          - production
        required: true
        default: staging

      run_tests:
        description: "Run tests before deploying?"
        type: boolean
        default: true

      version_tag:
        description: "Version tag (e.g. v1.0.0)"
        type: string
        required: false
        default: "latest"

jobs:
  dispatch-demo:
    name: Dispatch Demo
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Show inputs
        run: |
          echo "=== workflow_dispatch inputs ==="
          echo "Target env  : ${{ inputs.target_env }}"
          echo "Run tests   : ${{ inputs.run_tests }}"
          echo "Version tag : ${{ inputs.version_tag }}"

      - name: Conditional step — only runs if run_tests is true
        if: inputs.run_tests == true
        run: echo "Tests would run here because run_tests = true"

      - name: Conditional step — skip if tests disabled
        if: inputs.run_tests == false
        run: echo "Skipping tests — run_tests was set to false"

      - name: Show context
        run: |
          echo "=== github context ==="
          echo "Actor  : ${{ github.actor }}"
          echo "Branch : ${{ github.ref }}"
          echo "Repo   : ${{ github.repository }}"
