name: Artifact Download

on:
  workflow_run:
    workflows:
      - "Python CI"
      - "Node CI"
    branches:
      - dev
      - stage
      - main
    types:
      - completed

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  download-python-artifact:
    name: Download Python Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.name == 'Python CI'
      }}

    steps:
      - name: Show triggering Python CI run info
        run: |
          echo "================================================"
          echo "  Artifact Download triggered by Python CI"
          echo "================================================"
          echo "  Workflow   : ${{ github.event.workflow_run.name }}"
          echo "  Event      : ${{ github.event.workflow_run.event }}"
          echo "  Conclusion : ${{ github.event.workflow_run.conclusion }}"
          echo "  Head Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "  Head SHA   : ${{ github.event.workflow_run.head_sha }}"
          echo "  CI Run ID  : ${{ github.event.workflow_run.id }}"
          echo "  Created At : ${{ github.event.workflow_run.created_at }}"
          echo "================================================"

      - name: Compute Python GitHub Release tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

          if [ -z "${PR_NUMBER}" ]; then
            echo "ERROR: No PR number found in workflow_run payload."
            exit 1
          fi

          PR_BASE_BRANCH="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json baseRefName --jq '.baseRefName')"
          PR_HEAD_SHA="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')"

          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="python-${VERSION}"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${PR_BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          echo "Computed Python release tag: ${RELEASE_TAG}"

      - name: Download Python artifact from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p downloaded/python

          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}"

          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.whl" \
            --dir downloaded/python/

          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "SHA256SUMS.txt" \
            --dir downloaded/python/

      - name: Verify downloaded Python artifact
        run: |
          set -euo pipefail

          echo "Downloaded Python files:"
          ls -lh downloaded/python/

          if ! ls downloaded/python/*.whl >/dev/null 2>&1; then
            echo "ERROR: No Python .whl artifact downloaded."
            exit 1
          fi

          if [ ! -f downloaded/python/SHA256SUMS.txt ]; then
            echo "ERROR: SHA256SUMS.txt was not downloaded."
            exit 1
          fi

          echo "Local checksum:"
          sha256sum downloaded/python/*.whl

          echo ""
          echo "Verifying Python checksum file:"
          cd downloaded/python
          sha256sum -c SHA256SUMS.txt

          echo "Python artifact downloaded from GitHub Release successfully."
          echo "No rebuild performed."

  download-node-artifact:
    name: Download Node Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.name == 'Node CI'
      }}

    steps:
      - name: Show triggering Node CI run info
        run: |
          echo "================================================"
          echo "  Artifact Download triggered by Node CI"
          echo "================================================"
          echo "  Workflow   : ${{ github.event.workflow_run.name }}"
          echo "  Event      : ${{ github.event.workflow_run.event }}"
          echo "  Conclusion : ${{ github.event.workflow_run.conclusion }}"
          echo "  Head Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "  Head SHA   : ${{ github.event.workflow_run.head_sha }}"
          echo "  CI Run ID  : ${{ github.event.workflow_run.id }}"
          echo "  Created At : ${{ github.event.workflow_run.created_at }}"
          echo "================================================"

      - name: Compute Node GitHub Release tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

          if [ -z "${PR_NUMBER}" ]; then
            echo "ERROR: No PR number found in workflow_run payload."
            exit 1
          fi

          PR_BASE_BRANCH="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json baseRefName --jq '.baseRefName')"
          PR_HEAD_SHA="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')"

          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${PR_BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          echo "Computed Node release tag: ${RELEASE_TAG}"

      - name: Download Node artifacts from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p downloaded/node

          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}"

          echo "Downloading Node package artifact:"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.tgz" \
            --dir downloaded/node/

          echo "Downloading Node S3 static web artifact:"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "node-web-*.zip" \
            --dir downloaded/node/

          echo "Downloading checksum file:"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "SHA256SUMS.txt" \
            --dir downloaded/node/

      - name: Verify downloaded Node artifacts
        run: |
          set -euo pipefail

          echo "Downloaded Node files:"
          ls -lh downloaded/node/

          if ! ls downloaded/node/*.tgz >/dev/null 2>&1; then
            echo "ERROR: No Node .tgz artifact downloaded."
            exit 1
          fi

          if ! ls downloaded/node/node-web-*.zip >/dev/null 2>&1; then
            echo "ERROR: No Node static web node-web-*.zip artifact downloaded."
            exit 1
          fi

          if [ ! -f downloaded/node/SHA256SUMS.txt ]; then
            echo "ERROR: SHA256SUMS.txt was not downloaded."
            exit 1
          fi

          echo "Local checksums:"
          sha256sum downloaded/node/*.tgz
          sha256sum downloaded/node/node-web-*.zip

          echo ""
          echo "Verifying Node checksum file:"
          cd downloaded/node
          sha256sum -c SHA256SUMS.txt

          echo "Node artifacts downloaded from GitHub Release successfully."
          echo "Downloaded artifacts:"
          echo "- Node package artifact: .tgz"
          echo "- Node S3 static web artifact: node-web-*.zip"
          echo "No rebuild performed."