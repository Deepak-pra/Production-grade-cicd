name: Terraform S3 Windows PowerShell

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target GitHub Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

      run_apply:
        description: "Run terraform apply?"
        required: true
        default: false
        type: boolean

      run_destroy:
        description: "Run terraform destroy?"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: pwsh

jobs:
  terraform:
    name: Terraform S3 Bucket
    runs-on: windows-latest
    timeout-minutes: 25

    environment: ${{ inputs.target_environment }}

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_bucket_name: ${{ vars.TF_S3_BUCKET_NAME }}
      TF_VAR_environment: ${{ inputs.target_environment }}
      TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
      TF_BACKEND_REGION: ${{ vars.AWS_REGION }}
      TF_BACKEND_KEY: github-actions-training/s3-demo/${{ inputs.target_environment }}/terraform.tfstate

    defaults:
      run:
        shell: pwsh
        working-directory: infra/s3-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs and environment variables
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ inputs.run_apply }}" -eq "true" -and "${{ inputs.run_destroy }}" -eq "true") {
            Write-Error "run_apply and run_destroy cannot both be true."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:TF_VAR_aws_region)) {
            Write-Error "AWS_REGION environment variable is missing."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace("${{ vars.AWS_ROLE_ARN }}")) {
            Write-Error "AWS_ROLE_ARN environment variable is missing."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:TF_BACKEND_BUCKET)) {
            Write-Error "TF_BACKEND_BUCKET environment variable is missing."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:TF_VAR_bucket_name)) {
            Write-Error "TF_S3_BUCKET_NAME environment variable is missing."
            exit 1
          }

          if (-not $env:TF_VAR_bucket_name.StartsWith("shipfast-tf-demo-")) {
            Write-Error "TF_S3_BUCKET_NAME must start with shipfast-tf-demo-."
            exit 1
          }

          if ($env:TF_VAR_bucket_name -eq $env:TF_BACKEND_BUCKET) {
            Write-Error "TF_BACKEND_BUCKET and TF_S3_BUCKET_NAME must not be same."
            exit 1
          }

          Write-Host "Validation completed successfully."
          Write-Host "Environment       : $env:TF_VAR_environment"
          Write-Host "Target bucket     : $env:TF_VAR_bucket_name"
          Write-Host "Backend state key : $env:TF_BACKEND_KEY"
          Write-Host "Run apply         : ${{ inputs.run_apply }}"
          Write-Host "Run destroy       : ${{ inputs.run_destroy }}"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS authentication
        run: |
          $ErrorActionPreference = "Stop"

          aws sts get-caller-identity | Out-Null

          Write-Host "AWS authentication verified using OIDC."

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform version
        run: |
          $ErrorActionPreference = "Stop"

          terraform version

      - name: Terraform format check
        run: |
          $ErrorActionPreference = "Stop"

          terraform fmt -check -recursive

      - name: Terraform init with S3 backend
        run: |
          $ErrorActionPreference = "Stop"

          terraform init `
            -backend-config="bucket=$env:TF_BACKEND_BUCKET" `
            -backend-config="key=$env:TF_BACKEND_KEY" `
            -backend-config="region=$env:TF_BACKEND_REGION" `
            -backend-config="encrypt=true" `
            -input=false `
            -no-color

      - name: Terraform validate
        run: |
          $ErrorActionPreference = "Stop"

          terraform validate -no-color

      - name: Terraform plan
        run: |
          $ErrorActionPreference = "Stop"

          terraform plan -out=tfplan -input=false -no-color

      - name: Show Terraform plan output
        run: |
          $ErrorActionPreference = "Stop"

          terraform show -no-color tfplan

      - name: Terraform apply
        if: ${{ inputs.run_apply == true }}
        run: |
          $ErrorActionPreference = "Stop"

          terraform apply -auto-approve -input=false -no-color tfplan

      - name: Terraform destroy
        if: ${{ inputs.run_destroy == true }}
        run: |
          $ErrorActionPreference = "Stop"

          terraform destroy -auto-approve -input=false -no-color

      - name: Terraform output
        if: ${{ inputs.run_apply == true && inputs.run_destroy == false }}
        run: |
          $ErrorActionPreference = "Stop"

          terraform output -no-color

      - name: Write workflow summary
        if: always()
        run: |
          $applyInput = "${{ inputs.run_apply }}"
          $destroyInput = "${{ inputs.run_destroy }}"

          if ($destroyInput -eq "true") {
            $mode = "Plan and Destroy"
          }
          elseif ($applyInput -eq "true") {
            $mode = "Plan and Apply"
          }
          else {
            $mode = "Plan Only"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Terraform S3 Workflow Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Field | Value |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|---|---|"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Triggered by | $env:GITHUB_ACTOR |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Branch / Ref | $env:GITHUB_REF_NAME |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Environment | ${{ inputs.target_environment }} |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Execution mode | $mode |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| run_apply | $applyInput |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| run_destroy | $destroyInput |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Target S3 bucket | $env:TF_VAR_bucket_name |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Backend state key | $env:TF_BACKEND_KEY |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Authentication | AWS OIDC |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Runner | windows-latest |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Shell | PowerShell |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Security Notes"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- AWS authentication used OIDC."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- AWS account ID and role ARN are not printed."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- No AWS access keys are stored in GitHub secrets."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Terraform state is stored in S3 remote backend."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Workflow always runs until terraform plan."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Terraform plan output is visible in the 'Show Terraform plan output' step."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Terraform apply runs only when run_apply is true."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Terraform destroy runs only when run_destroy is true."