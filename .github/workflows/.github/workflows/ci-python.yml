name: Python CI

# ── Triggers ──────────────────────────────────────────
# Fires ONLY when files inside apps/python/ change.
# This is the path filter demo — change Node files and
# this workflow stays completely silent.
on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/python/**"
      - "!apps/python/**.md"   # ignore markdown-only changes
  pull_request:
    branches:
      - main
    paths:
      - "apps/python/**"

# ── Jobs ──────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ──────────────────────────────────────
  # Runs on every push and PR — fast, catches style issues early.
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        working-directory: apps/python
        run: flake8 . --config .flake8

  # ── Job 2: Test ──────────────────────────────────────
  # Runs in PARALLEL with lint — demonstrates parallel jobs.
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: apps/python
        run: pytest tests/ -v

      # ── continue-on-error demo ──
      # This step always runs but failures don't break the job.
      - name: Show context info
        if: always()
        run: |
          echo "Branch : ${{ github.ref }}"
          echo "Event  : ${{ github.event_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Actor  : ${{ github.actor }}"

  # ── Job 3: Build check ───────────────────────────────
  # Only runs on main branch push — not on PRs or feature branches.
  # Demonstrates: needs: + if: condition together.
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 5

    # ── if: condition demo ──
    # Skip this job entirely on pull requests and feature branches.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/python
        run: pip install -r requirements.txt

      - name: Verify import works
        working-directory: apps/python
        run: python -c "from calculator import add, subtract, multiply, divide, is_even; print('All imports OK')"

      - name: Show build info
        run: |
          echo "Build passed on main"
          echo "Commit SHA : ${{ github.sha }}"
          echo "Run number : ${{ github.run_number }}"
