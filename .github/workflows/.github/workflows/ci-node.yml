name: Node CI

# ── Triggers ──────────────────────────────────────────
# Fires ONLY when files inside apps/node/ change.
# Change Python files and this workflow stays silent.
on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/ci-node.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/ci-node.yml"

# ── Jobs ──────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ──────────────────────────────────────
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run eslint
        working-directory: apps/node
        run: npm run lint

  # ── Job 2: Test ──────────────────────────────────────
  # Runs in PARALLEL with lint.
  test:
    name: Test (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run jest
        working-directory: apps/node
        run: npm test

      # Runs regardless of test result — demonstrates always()
      - name: Show context info
        if: always()
        run: |
          echo "Branch : ${{ github.ref }}"
          echo "Event  : ${{ github.event_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Actor  : ${{ github.actor }}"

  # ── Job 3: Build check ───────────────────────────────
  # Only runs on main branch push.
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 5

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Verify require works
        working-directory: apps/node
        run: node -e "const u = require('./src/utils'); console.log('All exports OK:', Object.keys(u).join(', '))"

      - name: Show build info
        run: |
          echo "Build passed on main"
          echo "Commit SHA : ${{ github.sha }}"
          echo "Run number : ${{ github.run_number }}"