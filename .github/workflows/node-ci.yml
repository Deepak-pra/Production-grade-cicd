name: Node - CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Node Project
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required Node files
        run: |
          required_files=(
            "apps/node/package.json"
            "apps/node/package-lock.json"
            "apps/node/.eslintrc.json"
            "apps/node/sonar-project.properties"
            "apps/node/src/utils.js"
            "apps/node/src/pipeline.js"
            "apps/node/src/server.js"
            "apps/node/__tests__/utils.test.js"
            "apps/node/__tests__/pipeline.test.js"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
          done

          echo "All required Node files are present."

      - name: Validate package-lock.json is committed
        run: |
          if [ ! -f apps/node/package-lock.json ]; then
            echo "ERROR: apps/node/package-lock.json is missing."
            echo "Production-grade CI requires package-lock.json to be committed."
            echo "Run locally:"
            echo "cd apps/node && npm install"
            echo "Then commit apps/node/package-lock.json."
            exit 1
          fi

          echo "package-lock.json found:"
          ls -lh apps/node/package-lock.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run unit tests with coverage
        working-directory: apps/node
        run: |
          npx jest __tests__/utils.test.js --coverage

      - name: Show unit test coverage files
        working-directory: apps/node
        run: |
          echo "Coverage directory after unit tests:"
          ls -R coverage || true

      - name: Upload Node unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-unit-coverage-${{ github.sha }}
          path: apps/node/coverage/
          retention-days: 7
          if-no-files-found: error

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run integration tests with coverage
        working-directory: apps/node
        run: |
          npx jest __tests__/pipeline.test.js --coverage

      - name: Show integration test coverage files
        working-directory: apps/node
        run: |
          echo "Coverage directory after integration tests:"
          ls -R coverage || true

      - name: Upload Node integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-integration-coverage-${{ github.sha }}
          path: apps/node/coverage/
          retention-days: 7
          if-no-files-found: error

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Generate full test coverage for SonarCloud
        working-directory: apps/node
        run: |
          npm test

      - name: Verify Sonar coverage report exists
        working-directory: apps/node
        run: |
          echo "Checking lcov report:"
          ls -lh coverage/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - integration-test
      - sonar
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      environment_name: ${{ steps.version.outputs.environment_name }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      pr_head_sha: ${{ steps.version.outputs.pr_head_sha }}
      pr_base_branch: ${{ steps.version.outputs.pr_base_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Compute PR-based Node version
        id: version
        run: |
          set -euo pipefail

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${PR_BASE_BRANCH}" >> "$GITHUB_OUTPUT"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"

          echo "Computed Node version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "PR base branch: ${PR_BASE_BRANCH}"
          echo "PR head SHA: ${PR_HEAD_SHA}"

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Build Node package
        working-directory: apps/node
        run: |
          npm run build

          echo "Node build output:"
          ls -lh dist/

      - name: Validate Node package artifact
        working-directory: apps/node
        run: |
          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: Node package artifact was not generated."
            exit 1
          fi

          echo "Node package generated successfully:"
          ls -lh dist/*.tgz

      - name: Generate artifact checksum
        working-directory: apps/node
        run: |
          cd dist
          sha256sum *.tgz > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload Node build artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: |
            apps/node/dist/*.tgz
            apps/node/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ needs.build.outputs.pr_head_sha }}
          path: apps/node/dist/

      - name: Show Node artifact before scan
        run: |
          echo "Downloaded Node artifact:"
          ls -lh apps/node/dist/

      - name: Verify Node dependency files for Trivy
        run: |
          echo "Checking Node dependency manifest files"

          if [ ! -f apps/node/package.json ]; then
            echo "ERROR: apps/node/package.json is missing."
            exit 1
          fi

          if [ ! -f apps/node/package-lock.json ]; then
            echo "ERROR: apps/node/package-lock.json is missing."
            echo "Production-grade CI requires package-lock.json to be committed."
            exit 1
          fi

          echo "package.json:"
          cat apps/node/package.json

          echo ""
          echo "package-lock.json:"
          ls -lh apps/node/package-lock.json
          head -40 apps/node/package-lock.json

      - name: Run Trivy scan on Node lock file
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          TRIVY_INCLUDE_DEV_DEPS: "true"
        with:
          scan-type: fs
          scan-ref: apps/node/package-lock.json
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish Node Artifact to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - trivy
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ needs.build.outputs.pr_head_sha }}
          path: dist/

      - name: Show release artifact
        run: |
          echo "Artifact to publish:"
          ls -lh dist/

      - name: Publish Node artifact to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          ENVIRONMENT_NAME: ${{ needs.build.outputs.environment_name }}
          PR_HEAD_SHA: ${{ needs.build.outputs.pr_head_sha }}
          PR_BASE_BRANCH: ${{ needs.build.outputs.pr_base_branch }}
        run: |
          set -euo pipefail

          echo "=================================================="
          echo "Publishing Node artifact to GitHub Release"
          echo "=================================================="
          echo "Environment : ${ENVIRONMENT_NAME}"
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "PR base     : ${PR_BASE_BRANCH}"
          echo "PR head SHA : ${PR_HEAD_SHA}"
          echo "Artifact:"
          ls -lh dist/
          echo "=================================================="

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: No Node .tgz artifact found for release."
            exit 1
          fi

          if ! ls dist/SHA256SUMS.txt >/dev/null 2>&1; then
            echo "ERROR: No checksum file found for release."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Uploading assets with clobber."

            gh release upload "${RELEASE_TAG}" dist/*.tgz dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating new release ${RELEASE_TAG}."

            gh release create "${RELEASE_TAG}" dist/*.tgz dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node artifact built from PR head SHA ${PR_HEAD_SHA}, target branch ${PR_BASE_BRANCH}, environment ${ENVIRONMENT_NAME}" \
              --prerelease
          fi