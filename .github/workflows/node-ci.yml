name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Node Linting
        working-directory: apps/node
        run: npm run lint

  test:
    name: Test (jest)
    runs-on: ubuntu-latest
    needs: lint 
    timeout-minutes: 10

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependency Installation
        working-directory: apps/node
        run: npm install

      - name: NPM test
        working-directory: apps/node
        run: npm test