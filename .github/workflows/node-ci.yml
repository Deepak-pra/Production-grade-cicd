name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint
          echo "ESLint passed — no issues found"

  test:
    name: Unit Test (jest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run unit tests with coverage
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: node-unit-coverage
          path: apps/node/coverage/
          retention-days: 1

  integration-test:
    name: Integration Test (jest)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run integration tests with coverage
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: node-integration-coverage
          path: apps/node/coverage/
          retention-days: 1

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run full test suite with coverage
        working-directory: apps/node
        run: npx jest --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: apps/node
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: sonar
    timeout-minutes: 10
    if: github.event_name == 'push'

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Build Node app
        working-directory: apps/node
        run: |
          mkdir -p dist
          npm pack --pack-destination dist/
          ls -lh dist/

      - name: Compute version
        id: ver
        run: |
          SHA="${{ github.sha }}"
          VER="1.0.0-dev-${SHA:0:7}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      # ── Trivy Security Scan ──────────────────────────────────────
      # SHA-pinned to v0.35.0 (57a97c7) — safe version post supply chain incident (Mar 2026)
      # aquasecurity/setup-trivy pinned to v0.2.6 (3fb12ec) — last known safe version
      # Never use version tags — they were force-pushed with malicious code in the attack
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec4b9af6f21b8ac1c6b1b012c96f3308b3e
        with:
          cache: true
          version: v0.69.3

      - name: Scan Node artifact with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/dist/
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Export Trivy scan results
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/dist/
          format: json
          output: trivy-node-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-node-scan-${{ github.sha }}
          path: trivy-node-results.json
          retention-days: 7
