name: Node - CI

on:
  push:
    branches:
      - dev
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint

  unit-test:
    name: Unit Test (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run unit tests with coverage
        working-directory: apps/node
        run: |
          npx jest __tests__/utils.test.js --coverage

      - name: Show unit test coverage files
        working-directory: apps/node
        run: |
          echo "Coverage directory after unit tests:"
          ls -R coverage || true

      - name: Upload Node unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-unit-coverage-${{ github.sha }}
          path: apps/node/coverage/
          retention-days: 7
          if-no-files-found: error

  integration-test:
    name: Integration Test (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Run integration tests with coverage
        working-directory: apps/node
        run: |
          npx jest __tests__/pipeline.test.js --coverage

      - name: Show integration test coverage files
        working-directory: apps/node
        run: |
          echo "Coverage directory after integration tests:"
          ls -R coverage || true

      - name: Upload Node integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-integration-coverage-${{ github.sha }}
          path: apps/node/coverage/
          retention-days: 7
          if-no-files-found: error

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Generate full test coverage for SonarCloud
        working-directory: apps/node
        run: |
          npm test

      - name: Verify Sonar coverage report exists
        working-directory: apps/node
        run: |
          echo "Checking lcov report:"
          ls -lh coverage/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: [ lint, unit-test, integration-test, sonar ]
    if: github.event_name == 'push'
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          echo "Computed Node version: ${VERSION}"

      - name: Install dependencies
        working-directory: apps/node
        run: |
          npm ci

      - name: Build Node package
        working-directory: apps/node
        run: |
          npm run build

          echo "Node build output:"
          ls -lh dist/

      - name: Validate Node package artifact
        working-directory: apps/node
        run: |
          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: Node package artifact was not generated."
            exit 1
          fi

          echo "Node package generated successfully:"
          ls -lh dist/*.tgz

      - name: Upload Node build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: apps/node/dist/*.tgz
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: apps/node/dist/

      - name: Show Node artifact before scan
        run: |
          echo "Downloaded Node artifact:"
          ls -lh apps/node/dist/

      - name: Verify Node dependency files for Trivy
        run: |
          echo "Checking Node dependency manifest files"

          if [ ! -f apps/node/package.json ]; then
            echo "ERROR: apps/node/package.json is missing."
            exit 1
          fi

          if [ ! -f apps/node/package-lock.json ]; then
            echo "ERROR: apps/node/package-lock.json is missing."
            echo "Production-grade CI requires package-lock.json to be committed."
            echo "Run locally:"
            echo "cd apps/node && npm install"
            echo "Then commit apps/node/package-lock.json."
            exit 1
          fi

          echo "package.json:"
          cat apps/node/package.json

          echo ""
          echo "package-lock.json:"
          ls -lh apps/node/package-lock.json
          head -40 apps/node/package-lock.json

      - name: Run Trivy scan on Node lock file
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          TRIVY_INCLUDE_DEV_DEPS: "true"
        with:
          scan-type: fs
          scan-ref: apps/node/package-lock.json
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs:
      - build
      - trivy
    if: github.event_name == 'push'
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: dist/

      - name: Show release artifact
        run: |
          echo "Artifact to publish:"
          ls -lh dist/

      - name: Publish Node artifact to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_TAG="node-${VERSION}"

          echo "=================================================="
          echo "Publishing Node artifact to GitHub Releases"
          echo "=================================================="
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "Branch      : ${GITHUB_REF_NAME}"
          echo "SHA         : ${GITHUB_SHA}"
          echo "Artifact:"
          ls -lh dist/
          echo "=================================================="

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: No Node .tgz artifact found for release."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Uploading asset with clobber."

            gh release upload "${RELEASE_TAG}" dist/*.tgz \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating new release ${RELEASE_TAG}."

            gh release create "${RELEASE_TAG}" dist/*.tgz \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node artifact built from ${GITHUB_SHA} on branch ${GITHUB_REF_NAME}" \
              --prerelease
          fi
