name: Node CI

on:
  pull_request:
    branches:
      - dev
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail

          required_files=(
            "apps/node/package.json"
            "apps/node/package-lock.json"
            "apps/node/.eslintrc.json"
            "apps/node/sonar-project.properties"
            "apps/node/src/utils.js"
            "apps/node/src/pipeline.js"
            "apps/node/src/server.js"
            "apps/node/__tests__/utils.test.js"
            "apps/node/__tests__/pipeline.test.js"
            "apps/node/scripts/build-web.js"
          )

          for file in "${required_files[@]}"; do
            test -f "${file}"
          done

          echo "Required files are present."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run lint
        working-directory: apps/node
        run: npm run lint

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run unit tests
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run integration tests
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - integration-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Generate coverage
        working-directory: apps/node
        run: npm test

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare version
        run: |
          set -euo pipefail

          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          VERSION="1.0.0-dev-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

          echo "Version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Build npm package
        working-directory: apps/node
        run: npm run build

      - name: Build static web artifact
        working-directory: apps/node
        run: |
          set -euo pipefail

          npm run build:web

          WEB_ZIP_NAME="node-web-${VERSION}.zip"

          cd dist/web
          zip -r "../${WEB_ZIP_NAME}" .
          cd ..

          ls -lh

      - name: Generate checksum
        working-directory: apps/node
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.tgz node-web-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: |
            apps/node/dist/*.tgz
            apps/node/dist/node-web-*.zip
            apps/node/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: apps/node/dist/

      - name: Run Trivy scan on build output
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: apps/node/dist
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: trivy

    permissions:
      contents: write

    steps:
      - name: Prepare release tag
        run: |
          set -euo pipefail

          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          VERSION="1.0.0-dev-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: dist/

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ls -lh dist/

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node CI build artifact for dev environment."
          fi

      - name: Write release summary
        run: |
          {
            echo "## Node CI Release Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | ${VERSION} |"
            echo "| Release tag | ${RELEASE_TAG} |"
            echo "| Package artifact | .tgz |"
            echo "| Static web artifact | node-web-*.zip |"
            echo "| Checksum file | SHA256SUMS.txt |"
          } >> "$GITHUB_STEP_SUMMARY"
