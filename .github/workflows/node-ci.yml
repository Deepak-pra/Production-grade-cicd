name: Node CI

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail

          required_files=(
            "apps/node/package.json"
            "apps/node/package-lock.json"
            "apps/node/.eslintrc.json"
            "apps/node/sonar-project.properties"
            "apps/node/src/utils.js"
            "apps/node/src/pipeline.js"
            "apps/node/src/server.js"
            "apps/node/__tests__/utils.test.js"
            "apps/node/__tests__/pipeline.test.js"
            "apps/node/scripts/build-web.js"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Required file missing: ${file}"
              exit 1
            fi
          done

          echo "Required Node files are present."

      - name: Validate build:web script
        run: |
          set -euo pipefail

          if ! grep -q '"build:web"' apps/node/package.json; then
            echo "ERROR: package.json does not contain build:web script."
            echo "Expected:"
            echo '"build:web": "node scripts/build-web.js"'
            exit 1
          fi

          echo "build:web script is present."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run lint
        working-directory: apps/node
        run: npm run lint

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run unit tests
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run integration tests
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Generate coverage for SonarCloud
        working-directory: apps/node
        run: npm test

      - name: Verify coverage report
        working-directory: apps/node
        run: |
          set -euo pipefail
          ls -lh coverage/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, unit-test, integration-test, sonar ]
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare version
        run: |
          set -euo pipefail

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"
          echo "PR_HEAD_SHA=${PR_HEAD_SHA}" >> "$GITHUB_ENV"
          echo "PR_BASE_BRANCH=${PR_BASE_BRANCH}" >> "$GITHUB_ENV"

          echo "Version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Build npm package artifact
        working-directory: apps/node
        run: |
          set -euo pipefail

          npm run build

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: Node .tgz artifact was not generated."
            exit 1
          fi

          echo "Node package artifact:"
          ls -lh dist/*.tgz

      - name: Build static web artifact
        working-directory: apps/node
        run: |
          set -euo pipefail

          npm run build:web

          required_files=(
            "dist/web/index.html"
            "dist/web/error.html"
            "dist/web/styles.css"
            "dist/web/health.json"
            "dist/web/version.json"
            "dist/web/deployment-info.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Missing static web file: ${file}"
              exit 1
            fi
          done

          WEB_ZIP_NAME="node-web-${VERSION}.zip"

          cd dist/web
          zip -r "../${WEB_ZIP_NAME}" .
          cd ..

          echo "Static web artifact:"
          ls -lh "${WEB_ZIP_NAME}"

      - name: Generate checksum
        working-directory: apps/node
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.tgz node-web-*.zip > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: |
            apps/node/dist/*.tgz
            apps/node/dist/node-web-*.zip
            apps/node/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: apps/node/dist/

      - name: Show scan inputs
        run: |
          set -euo pipefail

          echo "Node dependency files:"
          ls -lh apps/node/package.json
          ls -lh apps/node/package-lock.json

          echo "Build artifacts:"
          ls -lh apps/node/dist/

      - name: Run Trivy scan on Node dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/node
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: trivy
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Prepare release tag
        run: |
          set -euo pipefail

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          SHORT_SHA="${PR_HEAD_SHA:0:7}"

          case "${PR_BASE_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported PR target branch: ${PR_BASE_BRANCH}"
              exit 1
              ;;
          esac

          VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
          RELEASE_TAG="node-${VERSION}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"
          echo "PR_HEAD_SHA=${PR_HEAD_SHA}" >> "$GITHUB_ENV"
          echo "PR_BASE_BRANCH=${PR_BASE_BRANCH}" >> "$GITHUB_ENV"

          echo "Version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.event.pull_request.head.sha }}
          path: dist/

      - name: Validate release files
        run: |
          set -euo pipefail

          echo "Release files:"
          ls -lh dist/

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: .tgz artifact missing."
            exit 1
          fi

          if ! ls dist/node-web-*.zip >/dev/null 2>&1; then
            echo "ERROR: node-web-*.zip artifact missing."
            exit 1
          fi

          if [ ! -f dist/SHA256SUMS.txt ]; then
            echo "ERROR: SHA256SUMS.txt missing."
            exit 1
          fi

      - name: Publish artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release exists. Uploading assets with clobber."

            gh release upload "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating release."

            gh release create "${RELEASE_TAG}" \
              dist/*.tgz \
              dist/node-web-*.zip \
              dist/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node CI build artifact for ${ENVIRONMENT_NAME}. PR head SHA: ${PR_HEAD_SHA}."
          fi

      - name: Write release summary
        run: |
          {
            echo "## Node CI Release Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | ${ENVIRONMENT_NAME} |"
            echo "| Version | ${VERSION} |"
            echo "| Release tag | ${RELEASE_TAG} |"
            echo "| PR base branch | ${PR_BASE_BRANCH} |"
            echo "| PR head SHA | ${PR_HEAD_SHA} |"
            echo "| Package artifact | .tgz |"
            echo "| Static web artifact | node-web-*.zip |"
            echo "| Checksum file | SHA256SUMS.txt |"
          } >> "$GITHUB_STEP_SUMMARY"