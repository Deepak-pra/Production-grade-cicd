name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint
          echo "ESLint passed — no issues found"

  test:
    name: Unit Test (jest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run unit tests with coverage
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: node-unit-coverage
          path: apps/node/coverage/
          retention-days: 1

  integration-test:
    name: Integration Test (jest)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run integration tests with coverage
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: node-integration-coverage
          path: apps/node/coverage/
          retention-days: 1

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run full test suite with coverage
        working-directory: apps/node
        run: npx jest --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: apps/node
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: sonar
    timeout-minutes: 5

    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Build Node app
        working-directory: apps/node
        run: |
          mkdir -p dist
          npm pack --pack-destination dist/
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shipfast-api-node-${{ github.sha }}
          path: apps/node/dist/
          retention-days: 7