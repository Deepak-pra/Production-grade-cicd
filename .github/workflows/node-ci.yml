name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run eslint
        working-directory: apps/node
        run: npm run lint

  test:
    name: Unit & Integration Test (jest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Run jest with coverage
        working-directory: apps/node
        run: npm test

      - name: Upload Node coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage-${{ github.sha }}
          path: apps/node/coverage/
          retention-days: 7
          if-no-files-found: error

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Generate coverage for SonarCloud
        working-directory: apps/node
        run: npm test

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/node

  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push'
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Computed version: ${VERSION}"

      - name: Install dependencies
        working-directory: apps/node
        run: npm ci

      - name: Build Node package
        working-directory: apps/node
        run: |
          npm run build
          echo "Node build output:"
          ls -lh dist/

      - name: Upload Node build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: apps/node/dist/*.tgz
          retention-days: 7
          if-no-files-found: error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: apps/node/dist/

      - name: Show Node artifact before scan
        run: |
          echo "Downloaded Node artifact:"
          ls -lh apps/node/dist/

      - name: Run Trivy scan on Node dependencies
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/
          scanners: vuln
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          format: table
          exit-code: 1
          ignore-unfixed: false

  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs:
      - build
      - trivy
    if: github.event_name == 'push'
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download Node build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: dist/

      - name: Publish Node artifact to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_TAG="node-${VERSION}"

          echo "=================================================="
          echo "Publishing Node artifact"
          echo "=================================================="
          echo "Version     : ${VERSION}"
          echo "Release tag : ${RELEASE_TAG}"
          echo "Branch      : ${GITHUB_REF_NAME}"
          echo "SHA         : ${GITHUB_SHA}"
          echo "Artifact:"
          ls -lh dist/
          echo "=================================================="

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Uploading asset with clobber."
            gh release upload "${RELEASE_TAG}" dist/*.tgz \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.tgz \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Node Build ${VERSION}" \
              --notes "Node artifact built from ${GITHUB_SHA} on branch ${GITHUB_REF_NAME}" \
              --prerelease
          fi