name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  # ── Runs in parallel with test and sonar ──────────────────────────
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint
          echo "ESLint passed — no issues found"

  # ── Runs in parallel with lint and sonar ─────────────────────────
  test:
    name: Unit & Integration Test (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run unit tests
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

      - name: Run integration tests
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: apps/node/coverage/
          retention-days: 3

  # ── Runs in parallel with lint and test ──────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run full test suite with coverage
        working-directory: apps/node
        run: npx jest --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: apps/node
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Runs only after lint + test + sonar all pass ──────────────────
  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: [lint, test, sonar]
    timeout-minutes: 10

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Build Node app
        working-directory: apps/node
        run: |
          mkdir -p dist
          npm pack --pack-destination dist/
          ls -lh dist/

      - name: Compute version
        id: ver
        run: |
          SHA="${{ github.sha }}"
          VER="1.0.0-dev-${SHA:0:7}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

  # ── Runs only after build passes ─────────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild artifact for scan
        working-directory: apps/node
        run: |
          npm install
          mkdir -p dist
          npm pack --pack-destination dist/

      # SHA-pinned to v0.35.0 — safe version confirmed post supply chain incident (Mar 2026)
      # Full SHA from: https://github.com/aquasecurity/setup-trivy/releases/tag/v0.2.6
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          cache: true
          version: v0.69.3

      - name: Scan Node artifact — table output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/dist/
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Scan Node artifact — JSON output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/dist/
          format: json
          output: trivy-node-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-node-scan-${{ github.sha }}
          path: trivy-node-results.json
          retention-days: 7

  # ── Runs only after trivy passes ─────────────────────────────────
  jfrog-upload:
    name: JFrog Upload
    runs-on: ubuntu-latest
    needs: trivy
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild artifact for upload
        working-directory: apps/node
        run: |
          npm install
          mkdir -p dist
          npm pack --pack-destination dist/

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_TOKEN }}

      - name: Upload to JFrog
        run: |
          SHA=${{ github.sha }}
          jf rt upload \
            'apps/node/dist/*.tgz' \
            "shipfast-node/${SHA}/"
          echo "Uploaded shipfast-node tarball for SHA: $SHA"