name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  # ── Runs in parallel with test and sonar ──────────────────────────
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run eslint
        working-directory: apps/node
        run: |
          npm run lint
          echo "ESLint passed — no issues found"

  # ── Runs in parallel with lint and sonar ─────────────────────────
  test:
    name: Unit & Integration Test (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run unit tests
        working-directory: apps/node
        run: npx jest __tests__/utils.test.js --coverage

      - name: Run integration tests
        working-directory: apps/node
        run: npx jest __tests__/pipeline.test.js --coverage

  # ── Runs in parallel with lint and test ──────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run full test suite with coverage
        working-directory: apps/node
        run: npx jest --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: apps/node
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Runs only after lint + test + sonar all pass ──────────────────
  build:
    name: Build Node App
    runs-on: ubuntu-latest
    needs: [lint, test, sonar]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Build Node app
        working-directory: apps/node
        run: |
          mkdir -p dist
          npm pack --pack-destination dist/
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: apps/node/dist/
          retention-days: 1

  # ── Runs only after build passes ─────────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      # SHA-pinned — safe version post Trivy supply chain incident (Mar 2026)
      # trivy-action v0.35.0 : 57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      # setup-trivy v0.2.6   : 3fb12ec12f41e471780db15c232d5dd185dcb514
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          cache: true
          version: v0.69.3

      - name: Scan node_modules — table output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Scan node_modules — JSON output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: apps/node/
          format: json
          output: trivy-node-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-node-scan-${{ github.sha }}
          path: trivy-node-results.json
          retention-days: 7

  # ── Runs only after trivy passes ─────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: trivy
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-dist-${{ github.sha }}
          path: dist/

      - name: Publish to GitHub Packages
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA="${SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"
          FILENAME=$(ls dist/*.tgz)

          echo "Publishing $FILENAME as version $VERSION"

          gh release create "node-${VERSION}" \
            --repo ${{ github.repository }} \
            --title "Node Build ${VERSION}" \
            --notes "Automated build from CI — SHA: ${SHA}" \
            --prerelease \
            dist/*.tgz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show published artifact info
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA="${SHA:0:7}"
          VERSION="1.0.0-dev-${SHORT_SHA}"
          echo "=== Published to GitHub Releases ==="
          echo "Version  : $VERSION"
          echo "SHA      : $SHA"
          echo "Repo     : ${{ github.repository }}"
          echo "URL      : https://github.com/${{ github.repository }}/releases/tag/node-${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}