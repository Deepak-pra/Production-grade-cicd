name: Node - CI

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/node-ci.yml"

jobs:

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run eslint
        working-directory: apps/node
        run: npm run lint

  test:
    name: Test (jest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/node
        run: npm install

      - name: Run jest
        working-directory: apps/node
        run: npm test
        #testing