name: Node CD

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - ".github/workflows/demo-node-ci.yml"
      - ".github/workflows/demo-node-cd.yml"

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: node-private-s3-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy to Private S3
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'stage' && 'stage' || 'dev' }}

    env:
      AWS_RETRY_MODE: adaptive
      AWS_MAX_ATTEMPTS: "5"

    steps:
      - name: Resolve deployment values
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MERGE_COMMIT_SHA: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          command -v gh >/dev/null
          command -v jq >/dev/null

          case "${TARGET_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported deployment branch: ${TARGET_BRANCH}"
              exit 1
              ;;
          esac

          RELEASE_PREFIX="node-1.0.0-${ENVIRONMENT_NAME}-"

          echo "Merge commit SHA : ${MERGE_COMMIT_SHA}"
          echo "Target branch    : ${TARGET_BRANCH}"
          echo "Environment      : ${ENVIRONMENT_NAME}"
          echo "Release prefix   : ${RELEASE_PREFIX}"

          PR_DATA="$(retry 3 2 gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${MERGE_COMMIT_SHA}/pulls")"

          PR_NUMBER="$(echo "${PR_DATA}" | jq -r --arg branch "${TARGET_BRANCH}" '
            map(select(.merged_at != null and .base.ref == $branch)) | first | .number // empty
          ')"

          PR_HEAD_SHA="$(echo "${PR_DATA}" | jq -r --arg branch "${TARGET_BRANCH}" '
            map(select(.merged_at != null and .base.ref == $branch)) | first | .head.sha // empty
          ')"

          if [ -n "${PR_NUMBER}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            SHORT_SHA="${PR_HEAD_SHA:0:7}"
            VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
            RELEASE_TAG="node-${VERSION}"

            echo "Resolved release from merged PR."
            echo "PR number    : ${PR_NUMBER}"
            echo "PR head SHA  : ${PR_HEAD_SHA}"
            echo "Release tag  : ${RELEASE_TAG}"
          else
            echo "No merged PR linked to commit ${MERGE_COMMIT_SHA}."
            echo "Falling back to latest matching release with prefix ${RELEASE_PREFIX}."

            RELEASE_TAG="$(retry 3 2 gh release list \
              --repo "${REPO}" \
              --limit 50 \
              --json tagName,createdAt \
              --jq "sort_by(.createdAt) | reverse | .[] | select(.tagName | startswith(\"${RELEASE_PREFIX}\")) | .tagName" \
              | head -n 1)"

            if [ -z "${RELEASE_TAG}" ]; then
              echo "ERROR: No release found with prefix ${RELEASE_PREFIX}"
              exit 1
            fi

            VERSION="${RELEASE_TAG#node-}"
            PR_NUMBER="N/A"
            PR_HEAD_SHA="N/A"

            echo "Fallback release selected: ${RELEASE_TAG}"
          fi

          echo "TARGET_BRANCH=${TARGET_BRANCH}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "PR_HEAD_SHA=${PR_HEAD_SHA}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Fetch PR Approvers for Audit
        if: env.PR_NUMBER != 'N/A'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          APPROVERS="$(gh api \
            repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews \
            --jq '.[] | select(.state=="APPROVED") | .user.login' \
            | sort -u | tr '\n' ',' | sed 's/,$//')"

          if [ -z "${APPROVERS}" ]; then
            APPROVERS="N/A"
          fi

          echo "PR_APPROVERS=${APPROVERS}" >> "$GITHUB_ENV"

      - name: Set PR Approvers as N/A when PR is unavailable
        if: env.PR_NUMBER == 'N/A'
        run: |
          set -euo pipefail
          echo "PR_APPROVERS=N/A" >> "$GITHUB_ENV"

      - name: Validate environment variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          test -n "${AWS_REGION}"
          test -n "${AWS_ROLE_ARN}"
          test -n "${NODE_S3_BUCKET}"
          test -n "${NODE_S3_PREFIX}"

          echo "Environment variables are available."
          echo "Target environment : ${ENVIRONMENT_NAME}"
          echo "AWS region         : ${AWS_REGION}"
          echo "S3 bucket          : ${NODE_S3_BUCKET}"
          echo "S3 prefix          : ${NODE_S3_PREFIX}"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          rm -rf release-assets
          mkdir -p release-assets

          retry 3 2 gh release download "${RELEASE_TAG}" \
            --repo "${REPO}" \
            --pattern "node-web-*.zip" \
            --dir release-assets/

          retry 3 2 gh release download "${RELEASE_TAG}" \
            --repo "${REPO}" \
            --pattern "SHA256SUMS.txt" \
            --dir release-assets/

          echo "Downloaded release assets:"
          ls -lh release-assets/

      - name: Verify checksum
        run: |
          set -euo pipefail

          cd release-assets

          mapfile -t WEB_ZIPS < <(find . -maxdepth 1 -type f -name "node-web-*.zip" -printf "%f\n")

          if [ "${#WEB_ZIPS[@]}" -ne 1 ]; then
            echo "ERROR: Expected exactly one node-web-*.zip file, found ${#WEB_ZIPS[@]}"
            printf '%s\n' "${WEB_ZIPS[@]}"
            exit 1
          fi

          NODE_WEB_ZIP="${WEB_ZIPS[0]}"

          if [ ! -f SHA256SUMS.txt ]; then
            echo "ERROR: SHA256SUMS.txt is missing."
            exit 1
          fi

          grep " ${NODE_WEB_ZIP}$" SHA256SUMS.txt > SHA256SUMS-node-web.txt

          echo "Checksum entry used:"
          cat SHA256SUMS-node-web.txt

          sha256sum -c SHA256SUMS-node-web.txt

      - name: Extract artifact
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site

          NODE_WEB_ZIP="$(find release-assets -maxdepth 1 -type f -name "node-web-*.zip" | head -n 1)"

          if [ -z "${NODE_WEB_ZIP}" ]; then
            echo "ERROR: node-web artifact not found."
            exit 1
          fi

          unzip -q "${NODE_WEB_ZIP}" -d site/

          required_files=(
            "site/index.html"
            "site/error.html"
            "site/styles.css"
            "site/health.json"
            "site/version.json"
            "site/deployment-info.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: Required extracted file missing: ${file}"
              exit 1
            fi
          done

          echo "Extracted files:"
          find site -maxdepth 2 -type f -print | sort

      - name: Update deployment metadata
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          DEPLOYED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > site/deployment-info.json <<EOF
          {
            "app": "shipfast-node",
            "environment": "${ENVIRONMENT_NAME}",
            "version": "${VERSION}",
            "releaseTag": "${RELEASE_TAG}",
            "targetBranch": "${TARGET_BRANCH}",
            "mergeCommitSha": "${GITHUB_SHA}",
            "prNumber": "${PR_NUMBER}",
            "prHeadSha": "${PR_HEAD_SHA}",
            "s3Bucket": "${NODE_S3_BUCKET}",
            "s3Prefix": "${NODE_S3_PREFIX}",
            "deployedAtUtc": "${DEPLOYED_AT}",
            "deployedBy": "GitHub Actions",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}"
          }
          EOF

          cat site/deployment-info.json

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          retry-max-attempts: 5
          unset-current-credentials: true
          mask-aws-account-id: true

      - name: Validate AWS identity and S3 access
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          retry 3 2 aws sts get-caller-identity >/dev/null
          retry 3 2 aws s3api get-bucket-location --bucket "${NODE_S3_BUCKET}" >/dev/null

          echo "AWS identity and private S3 bucket access validated."

      - name: Deploy to private S3
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          retry 3 3 aws s3 sync site/ "s3://${NODE_S3_BUCKET}/${NODE_S3_PREFIX}/" \
            --delete \
            --only-show-errors

          echo "Deployment completed to private S3."

      - name: Validate deployed objects
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "ERROR: Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Attempt ${attempt} failed. Retrying in ${delay} seconds..."
              sleep "${delay}"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          required_objects=(
            "index.html"
            "error.html"
            "styles.css"
            "health.json"
            "version.json"
            "deployment-info.json"
          )

          for object in "${required_objects[@]}"; do
            retry 3 2 aws s3api head-object \
              --bucket "${NODE_S3_BUCKET}" \
              --key "${NODE_S3_PREFIX}/${object}" \
              >/dev/null

            echo "Validated S3 object: ${NODE_S3_PREFIX}/${object}"
          done

          mkdir -p validation

          retry 3 2 aws s3 cp \
            "s3://${NODE_S3_BUCKET}/${NODE_S3_PREFIX}/deployment-info.json" \
            validation/deployment-info.json \
            --only-show-errors

          echo "Downloaded deployment metadata from S3:"
          cat validation/deployment-info.json

      - name: Write deployment summary
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          {
            echo "## Node CD Deployment Summary - Audit"
            echo ""
            echo "### Pipeline Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Run Number | ${GITHUB_RUN_NUMBER} |"
            echo "| Trigger Type | Push Post-Merge |"
            echo "| Triggered By | ${GITHUB_ACTOR} |"
            echo "| Job Status | ${{ job.status }} |"
            echo "| Pipeline Status | Deployment workflow completed successfully |"
            echo ""
            echo "### Deployment Context"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Target Branch | ${TARGET_BRANCH} |"
            echo "| Environment | ${ENVIRONMENT_NAME} |"
            echo "| Version | ${VERSION} |"
            echo "| Release Tag | ${RELEASE_TAG} |"
            echo "| Merge Commit SHA | ${GITHUB_SHA} |"
            echo ""
            echo "### Pull Request Traceability"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| PR Number | ${PR_NUMBER} |"
            echo "| PR Head SHA | ${PR_HEAD_SHA} |"
            echo "| PR Approvers | ${PR_APPROVERS:-N/A} |"
            echo ""
            echo "### Artifact and Integrity"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Artifact Source | GitHub Release |"
            echo "| Static Web Artifact | node-web-*.zip |"
            echo "| Checksum File | SHA256SUMS.txt |"
            echo "| Checksum Validation | Completed before deployment |"
            echo "| Artifact Integrity | Verified using SHA256 |"
            echo ""
            echo "### AWS Deployment Details"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Deployment Target | Private S3 |"
            echo "| S3 Bucket | ${NODE_S3_BUCKET} |"
            echo "| S3 Prefix | ${NODE_S3_PREFIX} |"
            echo "| AWS Authentication | OIDC role assumption |"
            echo "| Public Exposure | Not enabled by this workflow |"
            echo "| Deployment Validation | Required S3 objects validated after sync |"
          } >> "$GITHUB_STEP_SUMMARY"