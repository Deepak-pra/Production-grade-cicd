name: Node CD

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - "apps/node/**"
      - ".github/workflows/demo-node-ci.yml"
      - ".github/workflows/demo-node-cd.yml"

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: node-private-s3-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy to Private S3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'stage' && 'stage' || 'dev' }}

    steps:
      - name: Resolve deployment values
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MERGE_COMMIT_SHA: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          case "${TARGET_BRANCH}" in
            dev)
              ENVIRONMENT_NAME="dev"
              ;;
            stage)
              ENVIRONMENT_NAME="stage"
              ;;
            main)
              ENVIRONMENT_NAME="prod"
              ;;
            *)
              echo "ERROR: Unsupported deployment branch: ${TARGET_BRANCH}"
              exit 1
              ;;
          esac

          RELEASE_PREFIX="node-1.0.0-${ENVIRONMENT_NAME}-"

          echo "MERGE_COMMIT_SHA=${MERGE_COMMIT_SHA}"
          echo "TARGET_BRANCH=${TARGET_BRANCH}"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}"
          echo "RELEASE_PREFIX=${RELEASE_PREFIX}"

          PR_DATA="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${MERGE_COMMIT_SHA}/pulls")"

          PR_NUMBER="$(echo "${PR_DATA}" | jq -r --arg branch "${TARGET_BRANCH}" '
            map(select(.merged_at != null and .base.ref == $branch)) | first | .number // empty
          ')"

          PR_HEAD_SHA="$(echo "${PR_DATA}" | jq -r --arg branch "${TARGET_BRANCH}" '
            map(select(.merged_at != null and .base.ref == $branch)) | first | .head.sha // empty
          ')"

          if [ -n "${PR_NUMBER}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            SHORT_SHA="${PR_HEAD_SHA:0:7}"
            VERSION="1.0.0-${ENVIRONMENT_NAME}-${SHORT_SHA}"
            RELEASE_TAG="node-${VERSION}"

            echo "Resolved from merged PR."
            echo "PR number    : ${PR_NUMBER}"
            echo "PR head SHA  : ${PR_HEAD_SHA}"
            echo "Release tag  : ${RELEASE_TAG}"
          else
            echo "No merged PR linked to commit ${MERGE_COMMIT_SHA}. Falling back to latest matching release."

            RELEASE_TAG="$(gh release list \
              --repo "${REPO}" \
              --limit 50 \
              --json tagName,createdAt \
              --jq "sort_by(.createdAt) | reverse | .[] | select(.tagName | startswith(\"${RELEASE_PREFIX}\")) | .tagName" \
              | head -n 1)"

            if [ -z "${RELEASE_TAG}" ]; then
              echo "ERROR: No release found with prefix ${RELEASE_PREFIX}"
              exit 1
            fi

            VERSION="${RELEASE_TAG#node-}"
            PR_NUMBER="N/A"
            PR_HEAD_SHA="N/A"

            echo "Fallback release selected: ${RELEASE_TAG}"
          fi

          echo "TARGET_BRANCH=${TARGET_BRANCH}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT_NAME=${ENVIRONMENT_NAME}" >> "$GITHUB_ENV"
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "PR_HEAD_SHA=${PR_HEAD_SHA}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Validate environment variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          test -n "${AWS_REGION}"
          test -n "${AWS_ROLE_ARN}"
          test -n "${NODE_S3_BUCKET}"
          test -n "${NODE_S3_PREFIX}"

          echo "Environment variables are available."
          echo "Target environment: ${ENVIRONMENT_NAME}"
          echo "S3 bucket: ${NODE_S3_BUCKET}"
          echo "S3 prefix: ${NODE_S3_PREFIX}"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          gh release download "${RELEASE_TAG}" \
            --repo "${REPO}" \
            --pattern "node-web-*.zip" \
            --dir release-assets/

          gh release download "${RELEASE_TAG}" \
            --repo "${REPO}" \
            --pattern "SHA256SUMS.txt" \
            --dir release-assets/

          ls -lh release-assets/

      - name: Verify checksum
        run: |
          set -euo pipefail

          cd release-assets

          NODE_WEB_ZIP="$(ls node-web-*.zip | head -n 1)"

          grep " ${NODE_WEB_ZIP}$" SHA256SUMS.txt > SHA256SUMS-node-web.txt

          cat SHA256SUMS-node-web.txt
          sha256sum -c SHA256SUMS-node-web.txt

      - name: Extract artifact
        run: |
          set -euo pipefail

          mkdir -p site

          NODE_WEB_ZIP="$(ls release-assets/node-web-*.zip | head -n 1)"
          unzip -q "${NODE_WEB_ZIP}" -d site/

          test -f site/index.html
          test -f site/error.html
          test -f site/styles.css
          test -f site/health.json
          test -f site/version.json
          test -f site/deployment-info.json

          find site -maxdepth 2 -type f -print | sort

      - name: Update deployment metadata
        env:
          NODE_S3_BUCKET: ${{ vars.NODE_S3_BUCKET }}
          NODE_S3_PREFIX: ${{ vars.NODE_S3_PREFIX }}
        run: |
          set -euo pipefail

          DEPLOYED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > site/deployment-info.json <<EOF
          {
            "app": "shipfast-node",
            "environment": "${ENVIRONMENT_NAME}",
